openapi: 3.0.3
info:
  title: Panini Support Tickets - Tickets List API
  description: API para listar y crear tickets de soporte
  version: 1.0.0

servers:
  - url: https://api.panini-support.local
    description: Servidor de desarrollo (simulado)

paths:
  /tickets:
    get:
      summary: Listar todos los tickets
      description: Retorna lista de tickets ordenados por prioridad
      responses:
        '200':
          description: Lista de tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TicketResponse'
    post:
      summary: Crear nuevo ticket
      description: Crea un ticket de soporte relacionado con proveedores
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTicketRequest'
      responses:
        '201':
          description: Ticket creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTicketResponse'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    TicketResponse:
      type: object
      properties:
        id:
          type: string
          example: ticket-001
        title:
          type: string
          example: Faltante de paquetes en lote regional
        description:
          type: string
          example: El punto de venta reporta 120 paquetes menos respecto al despacho confirmado para la ruta GAM-03.
        providerName:
          type: string
          example: Distribuidora La Sabana
        category:
          $ref: '#/components/schemas/TicketCategory'
        priority:
          $ref: '#/components/schemas/TicketPriority'
        status:
          $ref: '#/components/schemas/TicketStatus'
        createdAt:
          type: string
          format: date-time
          example: 2026-05-28T10:30:00Z
        reportedBy:
          type: string
          example: Carlos Ramírez
        location:
          type: string
          example: Punto de Venta GAM-03

    CreateTicketRequest:
      type: object
      required:
        - title
        - description
        - providerName
        - category
        - priority
        - reportedBy
        - location
      properties:
        title:
          type: string
          example: Retraso en entrega hacia puntos de venta
        description:
          type: string
          example: La ruta programada no llegó a tres comercios registrados
        providerName:
          type: string
          example: Logística Caribe Norte
        category:
          $ref: '#/components/schemas/TicketCategory'
        priority:
          $ref: '#/components/schemas/TicketPriority'
        reportedBy:
          type: string
          example: María González
        location:
          type: string
          example: Sarapiquí

    CreateTicketResponse:
      type: object
      properties:
        id:
          type: string
          example: ticket-005
        message:
          type: string
          example: Ticket creado exitosamente

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Datos inválidos
        statusCode:
          type: integer
          example: 400

    TicketPriority:
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
        - CRITICAL
      example: HIGH

    TicketStatus:
      type: string
      enum:
        - OPEN
        - IN_PROGRESS
        - RESOLVED
        - CLOSED
      example: OPEN

    TicketCategory:
      type: string
      enum:
        - INVENTORY
        - DISTRIBUTION
        - SUPPLIER
        - DAMAGED_PRODUCT
        - DELIVERY_DELAY
        - OTHER
      example: INVENTORY
