openapi: 3.0.3
info:
  title: Panini Support Tickets - Update Ticket Priority API
  description: Contract for changing a ticket priority.
  version: 1.0.0

servers:
  - url: https://api.panini-support.local
    description: Simulated development server

paths:
  /tickets/{ticketId}/priority:
    patch:
      summary: Update ticket priority
      description: Changes the business priority of an existing ticket.
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTicketPriorityRequest'
      responses:
        '200':
          description: Priority updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
        '404':
          description: Ticket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    UpdateTicketPriorityRequest:
      type: object
      required:
        - priority
      properties:
        priority:
          $ref: '#/components/schemas/TicketPriority'

    TicketResponse:
      type: object
      properties:
        id:
          type: string
          example: ticket-001
        title:
          type: string
          example: Missing packs in regional batch
        description:
          type: string
          example: Store reports 120 missing packs compared with the confirmed GAM-03 route dispatch.
        providerName:
          type: string
          example: Distribuidora La Sabana
        category:
          $ref: '#/components/schemas/TicketCategory'
        priority:
          $ref: '#/components/schemas/TicketPriority'
        status:
          $ref: '#/components/schemas/TicketStatus'
        createdAt:
          type: string
          format: date-time
          example: 2026-05-28T10:30:00Z
        reportedBy:
          type: string
          example: Carlos Ramirez
        location:
          type: string
          example: Point of Sale GAM-03

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Ticket not found
        statusCode:
          type: integer
          example: 404

    TicketPriority:
      type: string
      enum: [LOW, MEDIUM, HIGH, CRITICAL]

    TicketStatus:
      type: string
      enum: [OPEN, IN_PROGRESS, RESOLVED, CLOSED]

    TicketCategory:
      type: string
      enum: [INVENTORY, DISTRIBUTION, SUPPLIER, DAMAGED_PRODUCT, DELIVERY_DELAY, OTHER]
