openapi: 3.0.3
info:
  title: Panini Support Tickets - List Tickets API
  description: Contract for retrieving support tickets.
  version: 1.0.0

servers:
  - url: https://api.panini-support.local
    description: Simulated development server

paths:
  /tickets:
    get:
      summary: List tickets
      description: Returns tickets ordered by business priority.
      responses:
        '200':
          description: Tickets returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TicketResponse'

components:
  schemas:
    TicketResponse:
      type: object
      properties:
        id:
          type: string
          example: ticket-001
        title:
          type: string
          example: Missing packs in regional batch
        description:
          type: string
          example: Store reports 120 missing packs compared with the confirmed GAM-03 route dispatch.
        providerName:
          type: string
          example: Distribuidora La Sabana
        category:
          $ref: '#/components/schemas/TicketCategory'
        priority:
          $ref: '#/components/schemas/TicketPriority'
        status:
          $ref: '#/components/schemas/TicketStatus'
        createdAt:
          type: string
          format: date-time
          example: 2026-05-28T10:30:00Z
        reportedBy:
          type: string
          example: Carlos Ramirez
        location:
          type: string
          example: Point of Sale GAM-03

    TicketPriority:
      type: string
      enum: [LOW, MEDIUM, HIGH, CRITICAL]

    TicketStatus:
      type: string
      enum: [OPEN, IN_PROGRESS, RESOLVED, CLOSED]

    TicketCategory:
      type: string
      enum: [INVENTORY, DISTRIBUTION, SUPPLIER, DAMAGED_PRODUCT, DELIVERY_DELAY, OTHER]
