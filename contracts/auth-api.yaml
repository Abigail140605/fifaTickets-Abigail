openapi: 3.0.3
info:
  title: Panini Support Tickets - Authentication API
  description: API para autenticación de usuarios del sistema de tickets
  version: 1.0.0

servers:
  - url: https://api.panini-support.local
    description: Servidor de desarrollo (simulado)

paths:
  /auth/login:
    post:
      summary: Autenticación de usuario
      description: Valida credenciales y retorna token de sesión
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: admin@panini.com
        password:
          type: string
          example: password123

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        userId:
          type: string
          example: user-001
        userName:
          type: string
          example: Admin Panini

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Credenciales inválidas
        statusCode:
          type: integer
          example: 401
